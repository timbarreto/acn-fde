name: Copilot plan, approve, then implement

on:
  workflow_dispatch:
    inputs:
      task:
        description: Task for Copilot to plan and implement
        required: true
        type: string
      base_branch:
        description: Base branch (defaults to the repository default branch)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: copilot-plan-then-implement-${{ inputs.base_branch || github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  plan:
    name: Create and validate plan PR
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      task_id: ${{ steps.validate.outputs.task_id }}
      pr_number: ${{ steps.validate.outputs.pr_number }}
      pr_url: ${{ steps.validate.outputs.pr_url }}
      head_branch: ${{ steps.validate.outputs.head_branch }}
      head_sha: ${{ steps.validate.outputs.head_sha }}
      base_branch: ${{ steps.validate.outputs.base_branch }}
    env:
      GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
      GH_PROMPT_DISABLED: "1"
      GH_PAGER: cat
      TASK_REQUEST: ${{ inputs.task }}
      BASE_INPUT: ${{ inputs.base_branch }}
      DEFAULT_BASE: ${{ github.event.repository.default_branch }}
    steps:
      - name: Validate credentials, CLI, and base branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "COPILOT_AGENT_PAT is not configured as an Actions repository secret." >&2
            exit 1
          fi

          if [[ ! "$TASK_REQUEST" =~ [^[:space:]] ]]; then
            echo "The task input must contain non-whitespace text." >&2
            exit 1
          fi

          gh api user >/dev/null

          gh_version="$(gh --version | sed -nE '1s/^gh version ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')"
          required_version="2.80.0"
          if [[ -z "$gh_version" ]] ||
             [[ "$(printf '%s\n' "$required_version" "$gh_version" | sort -V | head -n 1)" != "$required_version" ]]; then
            echo "GitHub CLI 2.80.0 or newer is required; found ${gh_version:-unknown}." >&2
            exit 1
          fi

          agent_help="$(gh agent-task create --help)"
          if ! grep -q -- '--base' <<<"$agent_help" ||
             ! grep -q -- '--follow' <<<"$agent_help"; then
            echo "This GitHub CLI does not provide the required gh agent-task create flags." >&2
            exit 1
          fi

          base_branch="$BASE_INPUT"
          if [[ -z "$base_branch" ]]; then
            base_branch="$DEFAULT_BASE"
          fi

          owner="${GITHUB_REPOSITORY%%/*}"
          repository="${GITHUB_REPOSITORY#*/}"
          qualified_base="refs/heads/${base_branch}"
          plan_expression="${base_branch}:PLAN.md"

          gh api graphql \
            -f query='query($owner: String!, $repository: String!, $qualifiedBase: String!, $planExpression: String!) {
              repository(owner: $owner, name: $repository) {
                base: ref(qualifiedName: $qualifiedBase) { name }
                plan: object(expression: $planExpression) { __typename }
              }
            }' \
            -F owner="$owner" \
            -F repository="$repository" \
            -F qualifiedBase="$qualified_base" \
            -F planExpression="$plan_expression" \
            > "$RUNNER_TEMP/base-preflight.json"

          if ! jq -e '.data.repository.base != null' "$RUNNER_TEMP/base-preflight.json" >/dev/null; then
            echo "Base branch '$base_branch' does not exist or is not accessible." >&2
            exit 1
          fi

          if ! jq -e '.data.repository.plan == null' "$RUNNER_TEMP/base-preflight.json" >/dev/null; then
            echo "The base branch already contains root PLAN.md; refusing to overwrite it." >&2
            exit 1
          fi

          printf 'RESOLVED_BASE=%s\n' "$base_branch" >> "$GITHUB_ENV"

      - name: Start and follow the default Copilot cloud agent
        id: create
        shell: bash
        run: |
          set -euo pipefail

          prompt_file="$RUNNER_TEMP/copilot-plan-prompt.md"
          task_log="$RUNNER_TEMP/copilot-plan-task.log"
          before_tasks="$RUNNER_TEMP/copilot-tasks-before.txt"
          after_tasks="$RUNNER_TEMP/copilot-tasks-after.txt"
          task_started_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "agents/repos/${GITHUB_REPOSITORY}/tasks?per_page=100&sort=created_at&direction=desc" \
            --jq '.tasks[].id' \
            | sort -u > "$before_tasks"

          {
            printf '%s\n' \
              '# Planning-only assignment' \
              '' \
              'Act as the default Copilot cloud agent. Do not implement the requested task in this session.' \
              'You MUST invoke the repository custom agent `context7-plan-review` as a planning subagent before writing anything.' \
              'The subagent must inspect the repository and make at least one relevant, version-matched Context7 documentation check.' \
              'Use the plan returned by that subagent; do not substitute a plan produced only by the parent agent.' \
              'If the subagent cannot be invoked, or Context7 authentication, connection, resolution, or querying fails, stop without creating or modifying files and without opening a pull request.' \
              '' \
              'After the subagent succeeds, create a draft pull request whose only changed file is a nonempty root `PLAN.md`.' \
              'The parent agent must persist the subagent result because the planning subagent is read-only.' \
              'Include the exact line `Planning subagent: context7-plan-review` in `PLAN.md`, plus the dependency versions, Context7 evidence, ordered implementation steps, validation, and risks supplied by the subagent.' \
              'Do not change, generate, format, or delete any other file. Do not implement any part of the plan.' \
              'Commit only `PLAN.md`, leave the pull request in draft state, and then finish.' \
              '' \
              '## User task'
            printf '%s\n' "$TASK_REQUEST"
          } > "$prompt_file"

          gh agent-task create \
            --repo "$GITHUB_REPOSITORY" \
            --base "$RESOLVED_BASE" \
            --from-file "$prompt_file" \
            --follow \
            2>&1 | tee "$task_log"

          task_id="$(sed -nE 's#.*\/copilot\/tasks\/([0-9A-Fa-f-]{36}).*#\1#p' "$task_log" | head -n 1 || true)"

          if [[ -z "$task_id" ]]; then
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "agents/repos/${GITHUB_REPOSITORY}/tasks?per_page=100&sort=created_at&direction=desc&since=${task_started_at}" \
              --jq '.tasks[].id' \
              | sort -u > "$after_tasks"

            mapfile -t new_task_ids < <(comm -13 "$before_tasks" "$after_tasks")
            if (( ${#new_task_ids[@]} != 1 )); then
              echo "Could not uniquely identify the task created by gh agent-task create." >&2
              exit 1
            fi
            task_id="${new_task_ids[0]}"
          fi

          if [[ ! "$task_id" =~ ^[0-9A-Fa-f-]{36}$ ]]; then
            echo "The created Copilot task ID is invalid." >&2
            exit 1
          fi

          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "agents/repos/${GITHUB_REPOSITORY}/tasks/${task_id}" \
            > "$RUNNER_TEMP/copilot-task-api.json"

          if ! jq -e --arg task_id "$task_id" --arg started "$task_started_at" \
            '.id == $task_id and .created_at >= $started' \
            "$RUNNER_TEMP/copilot-task-api.json" >/dev/null; then
            echo "The resolved task does not match the task created by this workflow run." >&2
            exit 1
          fi

          printf 'task_id=%s\n' "$task_id" >> "$GITHUB_OUTPUT"

      - name: Normalize and validate the exact plan PR
        id: validate
        shell: bash
        env:
          TASK_ID: ${{ steps.create.outputs.task_id }}
        run: |
          set -euo pipefail

          gh agent-task view \
            --repo "$GITHUB_REPOSITORY" \
            "$TASK_ID" \
            --json id,state,pullRequestNumber,pullRequestUrl \
            > "$RUNNER_TEMP/copilot-task.json"

          if ! jq -e --arg task_id "$TASK_ID" \
            '.id == $task_id and (.state | ascii_downcase) == "completed" and (.pullRequestNumber | type == "number") and (.pullRequestNumber > 0) and (.pullRequestUrl | type == "string") and (.pullRequestUrl | length > 0)' \
            "$RUNNER_TEMP/copilot-task.json" >/dev/null; then
            echo "The exact Copilot task did not complete successfully with a pull request." >&2
            exit 1
          fi

          pr_number="$(jq -r '.pullRequestNumber' "$RUNNER_TEMP/copilot-task.json")"
          task_pr_url="$(jq -r '.pullRequestUrl' "$RUNNER_TEMP/copilot-task.json")"

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" > "$RUNNER_TEMP/plan-pr.json"
          if [[ "$(jq -r '.state' "$RUNNER_TEMP/plan-pr.json")" != "open" ]]; then
            echo "The plan pull request is not open." >&2
            exit 1
          fi

          if [[ "$(jq -r '.draft' "$RUNNER_TEMP/plan-pr.json")" != "true" ]]; then
            gh pr ready --repo "$GITHUB_REPOSITORY" "$pr_number" --undo
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" > "$RUNNER_TEMP/plan-pr.json"
          fi

          pr_url="$(jq -r '.html_url' "$RUNNER_TEMP/plan-pr.json")"
          pr_base="$(jq -r '.base.ref' "$RUNNER_TEMP/plan-pr.json")"
          head_branch="$(jq -r '.head.ref' "$RUNNER_TEMP/plan-pr.json")"
          head_sha="$(jq -r '.head.sha' "$RUNNER_TEMP/plan-pr.json")"

          if [[ "$pr_url" != "$task_pr_url" ]] ||
             [[ "$pr_base" != "$RESOLVED_BASE" ]] ||
             [[ "$(jq -r '.draft' "$RUNNER_TEMP/plan-pr.json")" != "true" ]] ||
             [[ -z "$head_branch" ]] ||
             [[ ! "$head_sha" =~ ^[0-9A-Fa-f]{40}$ ]]; then
            echo "The plan pull request identity, base, draft state, or head is invalid." >&2
            exit 1
          fi

          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files?per_page=100" \
            --slurp > "$RUNNER_TEMP/plan-pr-files.json"

          if ! jq -e \
            '([.[][]] | length) == 1 and .[0][0].filename == "PLAN.md" and .[0][0].status == "added"' \
            "$RUNNER_TEMP/plan-pr-files.json" >/dev/null; then
            echo "The plan pull request must add only root PLAN.md." >&2
            exit 1
          fi

          gh api -X GET \
            "repos/${GITHUB_REPOSITORY}/contents/PLAN.md" \
            -f ref="$head_sha" \
            > "$RUNNER_TEMP/plan-file.json"

          if ! jq -e '.type == "file" and .encoding == "base64" and .size > 0' \
            "$RUNNER_TEMP/plan-file.json" >/dev/null; then
            echo "PLAN.md is missing or empty at the plan pull request head." >&2
            exit 1
          fi

          jq -r '.content' "$RUNNER_TEMP/plan-file.json" \
            | base64 --decode > "$RUNNER_TEMP/approved-plan.md"
          if ! grep -q '[^[:space:]]' "$RUNNER_TEMP/approved-plan.md" ||
             ! grep -Fxq 'Planning subagent: context7-plan-review' "$RUNNER_TEMP/approved-plan.md"; then
            echo "PLAN.md is empty or lacks the required planning-subagent evidence." >&2
            exit 1
          fi

          {
            printf 'task_id=%s\n' "$TASK_ID"
            printf 'pr_number=%s\n' "$pr_number"
            printf 'pr_url=%s\n' "$pr_url"
            printf 'head_branch=%s\n' "$head_branch"
            printf 'head_sha=%s\n' "$head_sha"
            printf 'base_branch=%s\n' "$pr_base"
          } >> "$GITHUB_OUTPUT"

          {
            printf 'Plan PR: %s\n\n' "$pr_url"
            printf 'Approved head candidate: `%s`\n' "$head_sha"
          } >> "$GITHUB_STEP_SUMMARY"

  plan-approval:
    name: Await human plan approval
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: plan-approval
      url: ${{ needs.plan.outputs.pr_url }}
    env:
      PLAN_PR_URL: ${{ needs.plan.outputs.pr_url }}
    steps:
      - name: Record approval
        shell: bash
        run: |
          printf 'Approved plan PR: %s\n' "$PLAN_PR_URL" >> "$GITHUB_STEP_SUMMARY"

  implement:
    name: Ask Copilot to implement the approved plan
    needs:
      - plan
      - plan-approval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT }}
      GH_PROMPT_DISABLED: "1"
      GH_PAGER: cat
      TASK_ID: ${{ needs.plan.outputs.task_id }}
      PR_NUMBER: ${{ needs.plan.outputs.pr_number }}
      PR_URL: ${{ needs.plan.outputs.pr_url }}
      EXPECTED_BASE: ${{ needs.plan.outputs.base_branch }}
      EXPECTED_HEAD: ${{ needs.plan.outputs.head_branch }}
      APPROVED_SHA: ${{ needs.plan.outputs.head_sha }}
    steps:
      - name: Revalidate the approved task and pull request
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "COPILOT_AGENT_PAT is not configured as an Actions repository secret." >&2
            exit 1
          fi

          gh api user >/dev/null
          gh agent-task view \
            --repo "$GITHUB_REPOSITORY" \
            "$TASK_ID" \
            --json id,state,pullRequestNumber,pullRequestUrl \
            > "$RUNNER_TEMP/approved-task.json"

          if ! jq -e \
            --arg task_id "$TASK_ID" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            '.id == $task_id and (.state | ascii_downcase) == "completed" and .pullRequestNumber == $pr_number and .pullRequestUrl == $pr_url' \
            "$RUNNER_TEMP/approved-task.json" >/dev/null; then
            echo "The approved task no longer resolves to the expected pull request." >&2
            exit 1
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > "$RUNNER_TEMP/approved-pr.json"
          if ! jq -e \
            --argjson number "$PR_NUMBER" \
            --arg url "$PR_URL" \
            --arg base "$EXPECTED_BASE" \
            --arg head "$EXPECTED_HEAD" \
            --arg sha "$APPROVED_SHA" \
            '.number == $number and .html_url == $url and .state == "open" and .draft == true and .base.ref == $base and .head.ref == $head and .head.sha == $sha' \
            "$RUNNER_TEMP/approved-pr.json" >/dev/null; then
            echo "The plan pull request changed after validation; implementation will not start." >&2
            exit 1
          fi

          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" \
            --slurp > "$RUNNER_TEMP/approved-pr-files.json"
          if ! jq -e \
            '([.[][]] | length) == 1 and .[0][0].filename == "PLAN.md" and .[0][0].status == "added"' \
            "$RUNNER_TEMP/approved-pr-files.json" >/dev/null; then
            echo "The approved pull request no longer contains only PLAN.md." >&2
            exit 1
          fi

          gh api -X GET \
            "repos/${GITHUB_REPOSITORY}/contents/PLAN.md" \
            -f ref="$APPROVED_SHA" \
            --jq '.size' \
            | grep -Eq '^[1-9][0-9]*$'

      - name: Request implementation on the exact plan PR
        shell: bash
        run: |
          set -euo pipefail

          marker="<!-- copilot-plan-then-implement:${GITHUB_RUN_ID} -->"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            --slurp > "$RUNNER_TEMP/pr-comments.json"

          if jq -e --arg marker "$marker" \
            'any(.[][]; (.body // "") | contains($marker))' \
            "$RUNNER_TEMP/pr-comments.json" >/dev/null; then
            echo "The implementation request for this workflow run is already present on the PR."
            exit 0
          fi

          comment_file="$RUNNER_TEMP/copilot-implementation-request.md"
          {
            printf '%s\n' \
              '@copilot Implement the human-approved `PLAN.md` on this existing pull request.' \
              '' \
              "The approved plan is pinned to commit \`$APPROVED_SHA\`. Work only on this PR's existing head branch \`$EXPECTED_HEAD\` and keep its base as \`$EXPECTED_BASE\`." \
              'Follow the approved plan closely and keep all changes scoped to it.' \
              'Remove the temporary root `PLAN.md` before finishing; it must not remain in the final diff.' \
              'Run `npm run test`, `npm run lint`, and `npm run build` and address failures caused by the implementation.' \
              'Do not run `npm run test:qa` or any Playwright QA tests.' \
              'Do not merge the pull request. Mark it ready for review only after the implementation is complete, `PLAN.md` is removed, and all three required validations pass.' \
              '' \
              "$marker"
          } > "$comment_file"

          gh pr comment \
            --repo "$GITHUB_REPOSITORY" \
            "$PR_NUMBER" \
            --body-file "$comment_file"

          printf 'Implementation requested on %s at approved SHA `%s`.\n' \
            "$PR_URL" "$APPROVED_SHA" >> "$GITHUB_STEP_SUMMARY"
